---
layout: default
---
<article class="showcase-detail">
  <h1>{{ page.title }}</h1>
  <p class="showcase-meta">
    {% if page.tag %}<span class="badge badge-{{ page.tag }}">{{ page.tag }}</span>{% endif %}
    {% if page.external_url %}<a href="{{ page.external_url }}" class="showcase-link">View project &rarr;</a>{% endif %}
  </p>
  {% if page.image %}
  <div class="showcase-hero">
    <img src="{{ page.image }}" alt="{{ page.title }}">
  </div>
  {% endif %}
  <div class="post-content">
    {{ content }}
  </div>
  <p><a href="/showcase/">&larr; Back to showcase</a></p>
</article>
