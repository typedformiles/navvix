<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}Navvix Limited</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% elsif page.excerpt %}{{ page.excerpt | strip_html | truncatewords: 50 }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% elsif page.excerpt %}{{ page.excerpt | strip_html | truncatewords: 50 }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="wrapper">
    <nav>
      <a href="/">[ Home ]</a>
      <a href="/showcase/">[ Showcase ]</a>
      <a href="/blog/">[ Blog ]</a>
      <a href="/about/">[ About ]</a>
    </nav>
    <main>
      {{ content }}
    </main>
  </div>
  <script data-goatcounter="https://navvix.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</body>
</html>
