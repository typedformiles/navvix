---
layout: default
---
<article class="post">
  <h1>{{ page.title }}</h1>
  <p class="post-date">{{ page.date | date: "%B %-d, %Y" }}{% if page.tag %} <span class="badge badge-{{ page.tag }}">{{ page.tag }}</span>{% endif %}</p>
  <div class="post-content">
    {{ content }}
  </div>
  <p><a href="/blog/">&larr; Back to all posts</a></p>
</article>
